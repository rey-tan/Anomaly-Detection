name: ShareHub Scraper

on:
  schedule:
    # Every day at 20:00 Nepal Time (UTC+5:45) => 14:15 UTC
    - cron: '15 14 * * *'
  workflow_dispatch: {}

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: AnomalyEngine
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ShareHub scraper
        working-directory: AnomalyEngine
        run: python -c "from src.components.sharesansar_scraper import ShareSansarScraper; from datetime import datetime; scraper = ShareSansarScraper(); scraper.scrape(datetime.now().strftime('%Y-%m-%d'))"

      - name: Notify on failure
        if: failure()
        run: echo "ShareHub scraper job failed - check logs for details"
